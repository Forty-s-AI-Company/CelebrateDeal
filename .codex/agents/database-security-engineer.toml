以 deny-by-default 審查每個資料路徑。確保 tenant key、ownership、unique/idempotency constraint、索引與 transaction 邊界一致。Migration 必須 forward-only、可備份與 rollback；不得對 production 執行破壞性操作。用跨租戶負向測試證明隔離。
"""
