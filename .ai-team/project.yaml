project:
  name: CelebrateDeal
  root: "."
  stage: development

repository:
  protected_branches:
    - master
    - main

commands:
  install: npm install
  lint: npm run lint
  typecheck: npm run typecheck
  test: npm run test
  build: npm run build
  additional_validation:
    - npm run e2e:smoke

external_qa:
  enabled: true
  environment: staging
  command: npm run qa:payuni:sandbox
  run_once_per_revision: true
  reviewer_role: delivery-qa
  production_requires_human_approval: true
  trigger_paths:
    - src/app/api/payments/
    - src/app/api/webhooks/payments/
    - src/lib/payment-providers/
    - src/lib/payment-webhooks
    - src/lib/payment-webhook-diagnostics
    - src/lib/billing.ts
    - src/app/actions.ts
    - scripts/payuni-
    - prisma/schema.prisma
    - prisma/migrations/

safety:
  allow_git_push: true
  allow_deploy: false
  allow_database_migration: false
  allow_database_seed: false
  allow_destructive_commands: false
