project:
  name: CelebrateDeal
  root: "."
  stage: development

repository:
  protected_branches:
    - master
    - main

commands:
  install: npm install
  lint: npm run lint
  typecheck: npm run typecheck
  test: npm run test
  build: npm run build
  additional_validation:
    - npm run e2e:smoke

safety:
  allow_git_push: true
  allow_deploy: false
  allow_database_migration: false
  allow_database_seed: false
  allow_destructive_commands: false
